<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Birthday - Rachel Sandra Mariam</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Segoe UI',sans-serif;
  text-align:center;
  color:white;
  background:black;
  overflow:hidden;
}

/* FIREWORK */
.firework{
  position:fixed;
  width:5px;
  height:5px;
  border-radius:50%;
  pointer-events:none;
}

/* PARTICLE */
.particle{
  position:fixed;
  width:6px;
  height:6px;
  background:white;
  border-radius:50%;
  opacity:0.5;
  animation:float 10s linear infinite;
}
@keyframes float{
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}

/* BG, NAV, CARD, dll (tetap sama) */
.bg{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background-size:cover;
  background-position:center;
  transition:opacity 1.5s;
  z-index:-3;
}
#bg2{opacity:0;}

.overlay{
  position:fixed;
  width:100%;height:100%;
  background:rgba(0,0,0,0.55);
  z-index:-2;
}

.navbar{
  position:fixed;
  top:0;
  width:100%;
  padding:12px;
  backdrop-filter:blur(10px);
  background:rgba(0,0,0,0.4);
  z-index:10;
}
.navbar a{
  margin:5px;
  padding:8px 16px;
  border-radius:20px;
  background:#ff4e80;
  color:white;
  text-decoration:none;
}

.card{
  margin-top:150px;
  padding:30px;
  border-radius:20px;
  background:rgba(0,0,0,0.4);
}

.profile{width:140px;border-radius:50%;}
.cake{width:200px;margin:20px;}

.btn{
  padding:12px 25px;
  border-radius:20px;
  background:#ff4e80;
  cursor:pointer;
}

.music-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  padding:10px 15px;
  border-radius:20px;
  background:#ff4e80;
  cursor:pointer;
}

/* ENVELOPE */
.envelope{
  display:none;
  position:fixed;
  bottom:15%;
  left:50%;
  transform:translateX(-50%);
  width:260px;
  height:160px;
  perspective:1000px;
  z-index:5;
}
.env-body{
  width:100%;
  height:100%;
  background:white;
  border-radius:10px;
  position:relative;
}
.flap{
  position:absolute;
  width:100%;
  height:100%;
  background:#ff4e80;
  clip-path:polygon(0 0,100% 0,50% 60%);
  transform-origin:top;
  transition:transform 0.8s ease;
}
.envelope.open .flap{
  transform:rotateX(-180deg);
}

/* LETTER */
.letter{
  display:none;
  position:fixed;
  bottom:12%;
  left:50%;
  width:460px;
  min-height:180px;
  max-height:72vh;
  overflow-y:auto;
  background:url("letter.png") center/cover;
  border-radius:18px;
  padding:35px 40px;
  color:#2b2b2b;
  font-size: 16.5px;
  line-height: 1.65;
  box-shadow: 0 15px 40px rgba(0,0,0,0.7);
  z-index:6;

  opacity: 0;
  transform: translateX(-50%) translateY(80px) scale(0.85);
  transition: all 1.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  
  box-shadow: 
    0 15px 40px rgba(0,0,0,0.7),
    0 0 25px rgba(255, 78, 128, 0.6),
    0 0 45px rgba(255, 215, 0, 0.4);
}

.letter.show{
  display:block;
  opacity: 1;
  transform: translateX(-50%) translateY(-90px) scale(1);
  animation: letterGlow 4s ease-in-out 0.4s forwards;
}

@keyframes letterGlow {
  0%   { box-shadow: 0 15px 40px rgba(0,0,0,0.7), 0 0 25px rgba(255,78,128,0.6), 0 0 45px rgba(255,215,0,0.4); }
  50%  { box-shadow: 0 15px 50px rgba(0,0,0,0.8), 0 0 40px rgba(255,78,128,0.85), 0 0 70px rgba(255,215,0,0.6); }
  100% { box-shadow: 0 15px 40px rgba(0,0,0,0.7), 0 0 30px rgba(255,78,128,0.7), 0 0 55px rgba(255,215,0,0.45); }
}

/* ANIMASI TEKS UCAPAN YANG LEBIH CANTIK + PERBAIKAN SPASI */
#text1, #text2 {
  text-align: left;
  white-space: pre-wrap;     /* ← PERBAIKAN UTAMA: spasi tetap muncul */
  word-break: break-word;
  line-height: 1.65;
}

.char {
  display: inline-block;
  opacity: 0;
  transform: translateY(12px) scale(0.8);
  animation: textPop 0.65s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
  text-shadow: 0 0 8px rgba(255, 78, 128, 0.3);
}

@keyframes textPop {
  0%   { opacity: 0; transform: translateY(12px) scale(0.8); }
  60%  { opacity: 1; transform: translateY(-3px) scale(1.05); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}

/* CLOSE */
.close{
  position:absolute;
  right:20px;
  top:18px;
  font-size: 22px;
  cursor:pointer;
  color:#333;
  z-index:10;
}

/* HINT */
.hint{
  position:absolute;
  bottom:18px;
  left:0;
  width:100%;
  text-align:center;
  font-size:13.5px;
  color:#555;
  animation:blink 1.2s infinite;
}
@keyframes blink{
  50%{opacity:0.35;}
}

/* CONFETTI & BALLOON (tetap sama) */
.confetti {
  position: fixed;
  width: 12px;
  height: 12px;
  border-radius: 3px;
  pointer-events: none;
  z-index: 999;
  animation: confettiFall linear forwards;
}
@keyframes confettiFall {
  0%   { transform: translateY(-100vh) rotate(0deg); }
  100% { transform: translateY(110vh) rotate(720deg); }
}

.ballon {
  position: fixed;
  font-size: 30px;
  z-index: -1;
  animation: balloonRise 8s linear forwards;
  text-shadow: 0 0 12px rgba(255,78,128,0.5);
}
@keyframes balloonRise {
  from { transform: translateY(110vh); }
  to   { transform: translateY(-30vh); }
}
</style>
</head>

<body>

<div id="bg1" class="bg"></div>
<div id="bg2" class="bg"></div>
<div class="overlay"></div>

<div class="navbar">
  <a href="index.html">Home</a>
  <a href="kenangan.html">Kenangan</a>
  <a href="tentang.html">Tentang</a>
  <a href="creator.html">Pembuat</a>
</div>

<div class="card">
<h1>🎉 Selamat Ulang Tahun 🎂</h1>
<h2>Rachel Sandra Mariam</h2>
<img src="hbdachel.jpg" class="profile"><br>
<img src="cake.jpg" class="cake"><br>
<div class="btn" onclick="start()">Ambil Surat</div>
</div>

<div class="music-btn" onclick="toggleMusic()">🔊</div>

<div class="envelope" id="env" onclick="openEnvelope()">
  <div class="env-body">
    <div class="flap"></div>
  </div>
</div>

<div class="letter" id="letter1">
  <div class="close" onclick="closeLetter()">❌</div>
  <p id="text1"></p>
  <div class="hint">klik di mana saja untuk lanjut ➜</div>
</div>

<div class="letter" id="letter2">
  <div class="close" onclick="closeLetter()">❌</div>
  <p id="text2"></p>
</div>

<audio id="music" loop>
  <source src="hbd.mp3">
</audio>

<script>
/* BG, PARTICLE, FIREWORK, CONFETTI, BALLOON, AUDIO, STATE, START, OPEN, CLOSE tetap sama seperti sebelumnya */
const images=["bg1.jpg","bg2.jpg","bg3.jpg"];
let i=0, active=1;
function changeBG(){
  let next = (active===1) ? 2 : 1;
  document.getElementById("bg"+next).style.backgroundImage = `url(${images[i]})`;
  document.getElementById("bg"+next).style.opacity = 1;
  document.getElementById("bg"+active).style.opacity = 0;
  active = next;
  i = (i+1) % images.length;
}
setInterval(changeBG, 5000);
changeBG();

setInterval(() => {
  let p = document.createElement("div");
  p.className = "particle";
  p.style.left = Math.random()*100 + "vw";
  p.style.opacity = Math.random();
  document.body.appendChild(p);
  setTimeout(() => p.remove(), 10000);
}, 300);

function launchFireworks(){
  let interval = setInterval(() => {
    let x = Math.random()*window.innerWidth;
    let y = Math.random()*window.innerHeight/2;
    for(let j=0; j<25; j++){
      let f = document.createElement("div");
      f.className = "firework";
      f.style.left = x + "px";
      f.style.top = y + "px";
      f.style.background = `hsl(${Math.random()*360},100%,60%)`;
      document.body.appendChild(f);
      let angle = Math.random()*2*Math.PI;
      let dist = Math.random()*130;
      f.animate([{transform:"translate(0,0)", opacity:1},{transform:`translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`, opacity:0}], {duration:1100});
      setTimeout(() => f.remove(), 1100);
    }
  }, 700);
  setTimeout(() => clearInterval(interval), 5000);
}

function launchConfetti(count = 140) {
  const colors = ['#ff4e80', '#ffd700', '#4eff9e', '#4e9eff', '#ff00ff', '#ffff00', '#ff7eb3'];
  for (let i = 0; i < count; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
    c.style.width = (7 + Math.random() * 12) + 'px';
    c.style.height = (7 + Math.random() * 12) + 'px';
    c.style.opacity = Math.random() * 0.7 + 0.6;
    c.style.animationDuration = (2.8 + Math.random() * 2.2) + 's';
    c.style.transform = `rotate(${Math.random() * 360}deg)`;
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 6000);
  }
}

function launchBalloons() {
  const emojis = ['🎈', '🎉', '💖', '⭐', '🌟', '🦋'];
  setInterval(() => {
    if (Math.random() > 0.35) {
      const b = document.createElement('div');
      b.className = 'ballon';
      b.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      b.style.left = Math.random() * 92 + 'vw';
      b.style.animationDuration = (7 + Math.random() * 5) + 's';
      document.body.appendChild(b);
      setTimeout(() => b.remove(), 13000);
    }
  }, 750);
}

const music = document.getElementById("music");
document.addEventListener("click", () => { if (music.paused) music.play().catch(() => {}); }, {once: true});
function toggleMusic(){ if(music.paused) music.play(); else music.pause(); }

let state = 0;
function start(){ env.style.display = "block"; }

function openEnvelope(){
  env.classList.add("open");
  launchFireworks();
  launchConfetti(170);
  launchBalloons();
  setTimeout(() => { letter1.classList.add("show"); type1(); state = 1; }, 600);
}

function closeLetter(){
  const letters = document.querySelectorAll('.letter');
  letters.forEach(letter => {
    letter.style.transition = 'all 0.7s cubic-bezier(0.4, 0, 1, 1)';
    letter.style.opacity = '0';
    letter.style.transform = 'translateX(-50%) translateY(60px) scale(0.9)';
  });
  setTimeout(() => {
    letter1.classList.remove("show");
    letter2.classList.remove("show");
    env.style.display = "none";
    state = 0;
    setTimeout(() => {
      document.querySelectorAll('.letter').forEach(l => {
        l.style.transition = 'all 1.3s cubic-bezier(0.34, 1.56, 0.64, 1)';
        l.style.animation = 'none';
      });
    }, 800);
  }, 700);
}

/* ANIMASI KETIK YANG SUDAH DIPERBAIKI (SPASI AMAN) */
const msg1 = "HAPPYY BIRTHDAYY MANTANNN KUUU YANGGG CANTIKKKK\nSemogaa Impiann Kamuuu tercapaiii dann jadiii anakk baikkk Bisaaa membanggakannn mamahhh kamuuu dannn semogaaa panjanggg umurrrr yaaawww✨";
const msg2 = "terimakasii sudaaa hadiirrr dii hiduppp akuuu, akuuu bikinnn iniii darii jauhhh jauhhh hariii semogaaa kamuuu senengggg yaaaaaa C:";

function type1(){
  let idx = 0;
  text1.innerHTML = "";
  const interval = setInterval(() => {
    if (idx < msg1.length) {
      const char = msg1[idx];
      const span = document.createElement('span');
      span.className = 'char';
      span.textContent = char;          // spasi sekarang tetap terjaga
      text1.appendChild(span);
      letter1.style.height = letter1.scrollHeight + "px";
      idx++;
    } else {
      clearInterval(interval);
    }
  }, 36);
}

function type2(){
  let idx = 0;
  text2.innerHTML = "";
  const interval = setInterval(() => {
    if (idx < msg2.length) {
      const char = msg2[idx];
      const span = document.createElement('span');
      span.className = 'char';
      span.textContent = char;
      text2.appendChild(span);
      letter2.style.height = letter2.scrollHeight + "px";
      idx++;
    } else {
      clearInterval(interval);
    }
  }, 36);
}

document.addEventListener("click", (e) => {
  if (e.target.closest(".btn")||e.target.closest(".envelope")||e.target.closest(".music-btn")) return;
  if (state === 1) {
    letter1.classList.remove("show");
    letter2.classList.add("show");
    type2();
    launchConfetti(100);
    state = 2;
  }
});
</script>

</body>
</html>
